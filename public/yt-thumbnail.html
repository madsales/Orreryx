<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: #07070a;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #e8e8e2;
  }

  .thumb {
    width: 1280px; height: 720px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  /* ── BACKGROUND LAYERS ── */
  .bg-gradient {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 80% at 75% 50%, rgba(224,56,54,.22) 0%, transparent 65%),
      radial-gradient(ellipse 60% 60% at 20% 80%, rgba(212,168,67,.1) 0%, transparent 60%),
      #07070a;
  }

  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 64px 64px;
  }

  /* Scanline effect */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,.08) 3px,
      rgba(0,0,0,.08) 4px
    );
    pointer-events: none;
  }

  /* ── LEFT ACCENT BAR ── */
  .left-bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 8px;
    background: linear-gradient(180deg, #e03836 0%, #d4a843 50%, #e03836 100%);
  }

  /* ── GLOBE VISUAL (right side) ── */
  .globe-wrap {
    position: absolute;
    right: -60px; top: 50%;
    transform: translateY(-50%);
    width: 580px; height: 580px;
  }
  .globe {
    width: 580px; height: 580px;
    border-radius: 50%;
    border: 2px solid rgba(224,56,54,.3);
    position: relative;
    background:
      radial-gradient(circle at 35% 35%, rgba(224,56,54,.15), transparent 60%),
      radial-gradient(circle at 70% 70%, rgba(212,168,67,.08), transparent 50%),
      rgba(224,56,54,.04);
    box-shadow:
      0 0 80px rgba(224,56,54,.25),
      0 0 160px rgba(224,56,54,.1),
      inset 0 0 80px rgba(0,0,0,.6);
  }

  /* Latitude lines */
  .lat-line {
    position: absolute; left: 0; right: 0;
    height: 1px;
    background: rgba(224,56,54,.15);
    border-radius: 50%;
  }

  /* Longitude lines */
  .lng-line {
    position: absolute; top: 0; bottom: 0;
    width: 1px;
    background: rgba(224,56,54,.12);
    left: 50%;
  }

  /* Hot spots on globe */
  .hotspot {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #e03836;
    box-shadow: 0 0 20px #e03836, 0 0 40px rgba(224,56,54,.6);
    animation: blink 1.5s infinite;
  }
  .hotspot::after {
    content: '';
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(224,56,54,.4);
    animation: ring 1.5s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes ring { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(2.5);opacity:0} }

  .hotspot.gold {
    background: #d4a843;
    box-shadow: 0 0 20px #d4a843, 0 0 40px rgba(212,168,67,.6);
  }
  .hotspot.gold::after { border-color: rgba(212,168,67,.4); }

  /* ── LEFT CONTENT ── */
  .content {
    position: relative; z-index: 10;
    padding: 60px 0 60px 56px;
    max-width: 720px;
  }

  /* Live badge */
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(224,56,54,.15);
    border: 1.5px solid rgba(224,56,54,.4);
    border-radius: 30px;
    padding: 10px 24px;
    font-size: 16px; font-weight: 800; color: #e03836;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 28px;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #e03836;
    box-shadow: 0 0 8px #e03836;
  }

  /* Big number */
  .big-num {
    font-size: 180px; font-weight: 900;
    line-height: .85; letter-spacing: -8px;
    color: #e03836;
    text-shadow: 0 0 60px rgba(224,56,54,.4);
    margin-bottom: 0;
    display: block;
  }

  .big-label {
    font-size: 52px; font-weight: 900;
    letter-spacing: -1px; line-height: 1;
    color: #e8e8e2;
    text-transform: uppercase;
    margin-bottom: 24px;
    display: block;
  }

  .sub-line {
    font-size: 26px; color: rgba(232,232,226,.6);
    line-height: 1.4; margin-bottom: 40px;
    font-weight: 400;
    max-width: 560px;
  }
  .sub-line strong { color: #d4a843; font-weight: 700; }

  /* Stats row */
  .stats {
    display: flex; gap: 20px; margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px;
    padding: 12px 20px;
    display: flex; flex-direction: column; align-items: center;
  }
  .stat-chip-num {
    font-size: 28px; font-weight: 900; line-height: 1;
  }
  .stat-chip-num.red { color: #e03836; }
  .stat-chip-num.gold { color: #d4a843; }
  .stat-chip-num.green { color: #3a9e6e; }
  .stat-chip-label {
    font-size: 12px; color: #585852;
    text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;
  }

  /* URL / Logo strip */
  .logo-strip {
    display: flex; align-items: center; gap: 20px;
  }
  .logo {
    font-size: 28px; font-weight: 900;
    letter-spacing: -0.5px;
  }
  .logo span { color: #e03836; }
  .url-badge {
    background: #e03836;
    color: #fff;
    font-size: 18px; font-weight: 800;
    padding: 10px 24px; border-radius: 6px;
    letter-spacing: 0.5px;
  }

  /* Top right corner tag */
  .corner-tag {
    position: absolute;
    top: 32px; right: 32px;
    font-size: 18px; color: rgba(232,232,226,.35);
    font-weight: 600; letter-spacing: 1px;
    z-index: 10;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #e03836 0%, #d4a843 50%, #e03836 100%);
  }
</style>
</head>
<body>
<div class="thumb">
  <div class="bg-gradient"></div>
  <div class="grid"></div>
  <div class="scanlines"></div>
  <div class="left-bar"></div>
  <div class="bottom-bar"></div>

  <!-- Globe -->
  <div class="globe-wrap">
    <div class="globe">
      <!-- Latitude lines -->
      <div class="lat-line" style="top:20%"></div>
      <div class="lat-line" style="top:35%"></div>
      <div class="lat-line" style="top:50%"></div>
      <div class="lat-line" style="top:65%"></div>
      <div class="lat-line" style="top:80%"></div>
      <!-- Longitude -->
      <div class="lng-line" style="transform:rotate(30deg);transform-origin:center"></div>
      <div class="lng-line" style="transform:rotate(60deg);transform-origin:center"></div>
      <div class="lng-line" style="transform:rotate(90deg);transform-origin:center"></div>
      <div class="lng-line" style="transform:rotate(120deg);transform-origin:center"></div>
      <div class="lng-line" style="transform:rotate(150deg);transform-origin:center"></div>
      <!-- Hot spots -->
      <div class="hotspot" style="top:38%;left:42%"></div>
      <div class="hotspot" style="top:44%;left:55%"></div>
      <div class="hotspot gold" style="top:52%;left:36%"></div>
      <div class="hotspot" style="top:30%;left:62%"></div>
      <div class="hotspot gold" style="top:58%;left:68%"></div>
      <div class="hotspot" style="top:66%;left:48%"></div>
    </div>
  </div>

  <!-- Corner tag -->
  <div class="corner-tag">FULL DEMO</div>

  <!-- Main content -->
  <div class="content">
    <div class="badge">
      <div class="dot"></div>
      Live Monitor
    </div>

    <span class="big-num">56</span>
    <span class="big-label">Active Wars.</span>

    <div class="sub-line">
      Track every conflict & its <strong>exact market impact</strong><br>
      in real time — energy, gold, oil, defense stocks.
    </div>

    <div class="stats">
      <div class="stat-chip">
        <div class="stat-chip-num gold">89s</div>
        <div class="stat-chip-label">Doomsday Clock</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-num green">5min</div>
        <div class="stat-chip-label">Updates</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-num red">45+</div>
        <div class="stat-chip-label">News Sources</div>
      </div>
    </div>

    <div class="logo-strip">
      <div class="logo">⊕ <span>Orrery</span></div>
      <div class="url-badge">FREE TRIAL → orreryx.io</div>
    </div>
  </div>
</div>
</body>
</html>
