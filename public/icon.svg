<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Dark background -->
  <rect width="400" height="400" rx="40" fill="#09090b"/>

  <!-- Outer orbit ring -->
  <ellipse cx="200" cy="200" rx="120" ry="48" fill="none" stroke="#f0f0ec" stroke-width="2.5" transform="rotate(-30,200,200)"/>

  <!-- Inner orbit ring dashed -->
  <ellipse cx="200" cy="200" rx="78" ry="30" fill="none" stroke="rgba(240,240,236,0.35)" stroke-width="1.5" stroke-dasharray="8 5" transform="rotate(-30,200,200)"/>

  <!-- Center dot -->
  <circle cx="200" cy="200" r="14" fill="#f0f0ec"/>

  <!-- Planet dot -->
  <circle cx="275" cy="163" r="11" fill="#f0f0ec"/>

  <!-- Crisis dot red -->
  <circle cx="163" cy="222" r="7" fill="#e03836"/>

  <!-- Wordmark -->
  <text x="200" y="318" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#f0f0ec" letter-spacing="8">ORRERY</text>

  <!-- Tagline -->
  <text x="200" y="346" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="rgba(240,240,236,0.5)" letter-spacing="4">GEOPOLITICAL INTELLIGENCE</text>
</svg>
