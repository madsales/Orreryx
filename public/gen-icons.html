<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orrery — Generate PWA Icons</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090b;color:#f0f0ec;font-family:'IBM Plex Mono',monospace,'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:32px;padding:40px}
h1{font-size:18px;letter-spacing:.08em;color:#f0f0ec}
p{font-size:11px;color:#666670;letter-spacing:.05em;text-align:center;max-width:480px;line-height:1.7}
.cards{display:flex;gap:32px;flex-wrap:wrap;justify-content:center}
.card{background:#111116;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:16px}
canvas{border-radius:8px;border:1px solid rgba(255,255,255,.08)}
.lbl{font-size:10px;color:#888;letter-spacing:.1em}
.dl-btn{background:#f0f0ec;color:#09090b;border:none;padding:9px 22px;border-radius:3px;font:700 10px/1 monospace;letter-spacing:.08em;cursor:pointer;transition:opacity .15s}
.dl-btn:hover{opacity:.84}
.status{font-size:10px;color:#3ab860;letter-spacing:.06em;height:14px}
</style>
</head>
<body>
<h1>ORRERY PWA ICON GENERATOR</h1>
<p>Click each "DOWNLOAD" button to save the PNG. Then move both files into <strong>public/</strong> folder and commit. Run this page from the local server: <code>http://localhost:3000/gen-icons.html</code></p>
<div class="cards">
  <div class="card">
    <div class="lbl">192 × 192 (icon-192.png)</div>
    <canvas id="c192" width="192" height="192"></canvas>
    <div class="status" id="s192"></div>
    <button class="dl-btn" onclick="download(192)">DOWNLOAD icon-192.png</button>
  </div>
  <div class="card">
    <div class="lbl">512 × 512 (icon-512.png)</div>
    <canvas id="c512" width="512" height="512"></canvas>
    <div class="status" id="s512"></div>
    <button class="dl-btn" onclick="download(512)">DOWNLOAD icon-512.png</button>
  </div>
</div>

<script>
const SVG_URL = '/icon.svg';

function drawIcon(canvas, size) {
  return new Promise((resolve, reject) => {
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(img, 0, 0, size, size);
      resolve();
    };
    img.onerror = reject;
    // Use blob approach to avoid tainted canvas issues
    fetch(SVG_URL)
      .then(r => r.blob())
      .then(blob => { img.src = URL.createObjectURL(blob); })
      .catch(reject);
  });
}

async function init() {
  try {
    await drawIcon(document.getElementById('c192'), 192);
    document.getElementById('s192').textContent = '✓ Ready';
    await drawIcon(document.getElementById('c512'), 512);
    document.getElementById('s512').textContent = '✓ Ready';
  } catch(e) {
    console.error(e);
    document.getElementById('s192').textContent = 'Error: ' + e.message;
    document.getElementById('s512').textContent = 'Error: ' + e.message;
  }
}

function download(size) {
  const canvas = document.getElementById('c' + size);
  const link = document.createElement('a');
  link.download = 'icon-' + size + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  document.getElementById('s' + size).textContent = '✓ Downloaded!';
}

init();
</script>
</body>
</html>
